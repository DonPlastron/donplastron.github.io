<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Blog</title>
<link rel="icon" type="image/x-icon" href="img/icon.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================= BASIS ================= */

:root {
    --bg: #fdf8f3;
    --accent: #b08968;
    --dark: #3e2f26;
    --soft: #7f6757;
    --card: #ffffff;
}

body {
    margin: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--dark);
}

/* Fade animatie */
.fade {
    animation: fadeIn 1s ease;
}
@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

/* ================= NAVIGATIE ================= */

nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(253,248,243,0.9);
    backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    gap: 60px;
    padding: 25px 0;
    border-bottom: 1px solid #eadfd6;
    z-index: 1000;
}

nav a {
    text-decoration: none;
    color: var(--dark);
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    position: relative;
}

nav a::after { /* Underline effect for nav links*/
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    bottom: -6px;
    left: 50%;
    background: var(--accent);
    transition: 0.3s ease;
    transform: translateX(-50%);
}

nav a:hover::after {
    width: 100%;
}

/* ================= SIDEBAR ================= */

.sidebar {
    position: fixed;
    left: -290px;
    top: 0;
    width: 250px;
    height: 100%;
    background: white;
    box-shadow: 5px 0 20px rgba(0,0,0,0.1);
    padding: 20px;
    transition: 0.4s;
    z-index: 2000;
    overflow-y: auto;
}

.sidebar.open {
    left: 0;
}

.sidebar h3 {
    margin-top: 30px;
}

.sidebar a {
    display: block;
    margin: 8px 0;
    cursor: pointer;
    color: var(--soft);
}

.menu-btn {
    position: fixed;
    left: 20px;
    top: 20px;
    cursor: pointer;
    font-size: 24px;
    z-index: 3000;
}

/* ================= LAYOUT ================= */

.container {
    margin-top: 160px;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
    padding: 40px 20px;
    text-align: center;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
}

/* ================= GRID ================= */

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* 4 naast elkaar */
    gap: 30px;
    padding: 40px;
}

.grid-item {
    background: var(--card);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: 0.4s ease;
    cursor: pointer;
}

.grid-item:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.08);
}

.grid-item img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.overlay {
    padding: 15px;
    font-family: 'Playfair Display', serif;
}

/* ================= DETAIL PAGINA ================= */

.detail-layout {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    text-align: left;
}

.detail-text {
    flex: 1;
}

.detail-image {
    flex: 1;
}

.detail-image img {
    width: 100%;
    border-radius: 20px;
}

@media(max-width:900px){
    .grid{
        grid-template-columns: repeat(2,1fr);
    }
    .detail-layout{
        flex-direction: column;
    }
}

.hidden { display:none; }

</style>
</head>
<body>

<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<div class="sidebar" id="sidebar">
    <br>
    <h3 onclick="showHobby()" style="cursor: pointer;">Hobby's</h3>
    <div id="sidebarHobby"></div>

    <h3 onclick="showFilms()" style="cursor: pointer;">Films</h3>
    <div id="sidebarFilms"></div>
</div>

<nav>
<a onclick="showHome()">Home</a>
<a onclick="showHobby()">Hobby's</a>
<a onclick="showFilms()">Films</a>
</nav>

<!-- HOME -->
<div id="home" class="container fade">
<h1>Welkom</h1>
<img src="img/daphne.jpg" height="400" class="main-image">
<p>enlo ik ben dafenu en dit is mijn blog.</p>
</div>

<!-- HOBBY PAGINA -->
<div id="hobbyPage" class="hidden container">
<h1>Mijn Hobby's</h1>
<div class="grid" id="hobbyGrid"></div>
</div>

<!-- FILM PAGINA -->
<div id="filmPage" class="hidden container">
<h1>Films</h1>
<div class="grid" id="filmGrid"></div>
</div>

<!-- DETAIL PAGINA -->
<div id="detailPage" class="hidden container">
<h1 id="detailTitle"></h1>

<div class="detail-layout">
    <div class="detail-text">
        <p id="detailText"></p>
    </div>
    <div class="detail-image">
        <img id="detailImage">
    </div>
</div>

</div>

<script>

/* ================= DATA ================= */
/*
Dit deel voegt nieuwe hobby's/films toe.
title = naam van hobby/film (komt in titel, sidebar en op detailpagina)
text = tekstje dat op detailpagina komt
    - Formatting via HTML formatting (https://www.w3schools.com/html/html_formatting.asp)
    - Andere soorten formatting zijn makkelijk te vinden door "format ... html" te googelen
image = pad naar afbeelding van icoontje
detailImage = pad naar afbeelding op detailpagina (indien leeg: wordt zelfde foto als image)
*/

let data = {
    hobbies: [
        {title:"Fotografie", text:"hier komt jouw tekstje dan", image:"https://picsum.photos/400?1", detailImage:"https://picsum.photos/800?11"},
        {title:"Naaien", text:"Naaien😏", image:"img/naaien.jpg", detailImage:"https://picsum.photos/800?12"},
        {title:"Poker", text:"All in!", image:"img/poker.jpg", detailImage:"https://picsum.photos/800?13"},
        {title:"Vogelspotten", text:"Spot de vogel.", image:"img/vogelspot.jpeg", detailImage:"https://picsum.photos/800?14"}
    ],
    films: [
        {title:"Inception", text:"", image:"https://picsum.photos/400?5", detailImage:""},
        {title:"Interstellar", text:"", image:"https://picsum.photos/400?6", detailImage:""},
        {title:"Titanic", text:"", image:"https://picsum.photos/400?7", detailImage:""},
        {title:"Franse films", text:"Mijn supercoole bf is zijn Frans aan het verbeteren door Franse films te kijken. Hij gebruikt deze pagina van mijn website om ze op te lijsten: <br> <ul> <li>Prête-moi ta main</li></ul>"
        , image:"img/franse_siemen.jfif", detailImage:""}
    ]
};

render();

/* ================= RENDER ================= */

function render(){

// Hobby grid
let hobbyGrid=document.getElementById("hobbyGrid");
hobbyGrid.innerHTML="";
data.hobbies.forEach((h,i)=>{
let div=document.createElement("div");
div.className="grid-item fade";
div.innerHTML=`<img src="${h.image}"><div class="overlay">${h.title}</div>`;
div.onclick=()=>showDetail("hobby",i);
hobbyGrid.appendChild(div);
});

// Film grid
let filmGrid=document.getElementById("filmGrid");
filmGrid.innerHTML="";
data.films.forEach((f,i)=>{
let div=document.createElement("div");
div.className="grid-item fade";
div.innerHTML=`<img src="${f.image}"><div class="overlay">${f.title}</div>`;
div.onclick=()=>showDetail("film",i);
filmGrid.appendChild(div);
});

// Sidebar
let sh=document.getElementById("sidebarHobby");
sh.innerHTML="";
data.hobbies.forEach((h,i)=>{
sh.innerHTML+=`<a onclick="showDetail('hobby',${i})">${h.title}</a>`;
});

let sf=document.getElementById("sidebarFilms");
sf.innerHTML="";
data.films.forEach((f,i)=>{
sf.innerHTML+=`<a onclick="showDetail('film',${i})">${f.title}</a>`;
});

}

/* ================= NAVIGATIE ================= */

function hideAll(){
home.classList.add("hidden");
hobbyPage.classList.add("hidden");
filmPage.classList.add("hidden");
detailPage.classList.add("hidden");
}

function showHome(){ hideAll(); home.classList.remove("hidden"); }
function showHobby(){ hideAll(); hobbyPage.classList.remove("hidden"); }
function showFilms(){ hideAll(); filmPage.classList.remove("hidden"); }

function showDetail(type,i){
hideAll();
let item = type==="hobby" ? data.hobbies[i] : data.films[i];
detailTitle.innerText=item.title;
detailText.innerHTML=item.text || "";
detailImage.src=item.detailImage || item.image;
detailPage.classList.remove("hidden");
}

function toggleSidebar(){
sidebar.classList.toggle("open");
}

</script>
</body>
</html>
